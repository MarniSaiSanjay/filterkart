<svg xmlns="http://www.w3.org/2000/svg" viewBox="21.25 19.75 95 95" width="128" height="128">
  <defs>
    <linearGradient id="gFrame" x1="30" y1="98" x2="98" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b6ef5"/>
      <stop offset="0.55" stop-color="#4f8ef0"/>
      <stop offset="1" stop-color="#46c9d0"/>
    </linearGradient>
    <linearGradient id="gFunnel" x1="63" y1="47" x2="63" y2="80" gradientUnits="userSpaceOnUse">
